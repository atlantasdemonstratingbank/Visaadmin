<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Layout Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1a1a2e;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

/* ── Topbar ── */
#topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:14px;font-weight:700;color:#e94560;margin-right:4px;white-space:nowrap}
.tb-btn{background:#0f3460;color:#ccc;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.tb-btn:hover,.tb-btn:active{border-color:#e94560;color:#e94560}
.tb-btn.danger{border-color:#7f1d1d;color:#fca5a5}
select.tb-select{background:#0f3460;color:#fff;border:1px solid #e94560;border-radius:6px;padding:5px 6px;font-size:12px;cursor:pointer}
.tb-zoom{display:flex;align-items:center;gap:4px}
.tb-zoom button{background:#0f3460;color:#fff;border:1px solid #333;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
#zoomLabel{color:#aaa;font-size:12px;min-width:38px;text-align:center}
.tb-save{background:#e94560;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;margin-left:auto}
.tb-back{background:transparent;color:#aaa;border:1px solid #333;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}

/* ── Layout ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── Left panel ── */
#leftPanel{width:160px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.panel-head{padding:7px 10px;font-size:10px;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #0f3460;flex-shrink:0}
#fieldPalette{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.field-btn{width:100%;background:#0f3460;color:#ccc;border:1px solid #2a2a4a;border-radius:6px;padding:7px 8px;font-size:11px;cursor:pointer;text-align:left;transition:all .15s}
.field-btn:hover,.field-btn:active{border-color:#e94560;color:#e94560}
#addBtns{padding:6px;border-top:1px solid #0f3460;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.add-btn{width:100%;background:transparent;border:1px dashed #555;border-radius:6px;padding:7px;font-size:11px;cursor:pointer;transition:all .15s}
.add-btn:hover{border-color:#e94560;color:#e94560}
.add-btn.photo{color:#aaa}
.add-btn.text{color:#e94560;border-color:#e94560}
#layersSection{border-top:1px solid #0f3460;flex-shrink:0}
#layersList{max-height:130px;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:2px}
.layer-row{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.layer-row:hover{background:#0f3460}
.layer-row.active{background:#e9456022;border-color:#e94560}
.layer-icon{font-size:11px}
.layer-name{font-size:11px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Stage ── */
#stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:28px;background:#111822;touch-action:pan-x pan-y}
#canvasOuter{position:relative;flex-shrink:0;transform-origin:top center}
#bgLayer{position:absolute;inset:0;background-size:cover;background-position:center;pointer-events:none;border-radius:0}
#docCanvas{position:relative;background:#fff}
.el{position:absolute;cursor:grab;touch-action:none;box-sizing:border-box;padding:2px 4px;border-radius:2px;min-width:30px;min-height:16px}
.el:active{cursor:grabbing}
.el.selected{outline:2px solid #e94560 !important}
.el-handle{position:absolute;width:16px;height:16px;border:2px solid #fff;border-radius:50%;touch-action:none;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.5);z-index:10}
.el-handle.resize{background:#e94560;right:-8px;bottom:-8px;cursor:nwse-resize}
.el-handle.del{background:#f87171;right:-8px;top:-8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.grid-overlay{position:absolute;inset:0;pointer-events:none;opacity:.06;background-image:linear-gradient(#6666ff 1px,transparent 1px),linear-gradient(90deg,#6666ff 1px,transparent 1px);background-size:20px 20px}

/* ── Right panel ── */
#rightPanel{width:182px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;flex-shrink:0}
#propsInner{padding:10px;display:flex;flex-direction:column;gap:10px}
.prop-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
.prop-input{width:100%;background:#0f3460;color:#fff;border:1px solid #2a2a4a;border-radius:5px;padding:6px 7px;font-size:12px}
.prop-input:focus{outline:none;border-color:#e94560}
.prop-row{display:flex;gap:4px}
.prop-row .prop-input{flex:1}
.prop-toggle-row{display:flex;gap:4px}
.ptog{flex:1;background:#0f3460;color:#ccc;border:1px solid #2a2a4a;border-radius:5px;padding:5px 4px;font-size:11px;cursor:pointer;text-align:center}
.ptog.on{background:#e94560;border-color:#e94560;color:#fff}
.del-btn{width:100%;background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;padding:7px;font-size:12px;cursor:pointer;margin-top:4px}
.range-wrap{display:flex;align-items:center;gap:6px}
.range-wrap input[type=range]{flex:1;accent-color:#e94560;height:4px}
.range-val{color:#e94560;font-size:11px;min-width:28px;text-align:right}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f3460;color:#fff;padding:9px 22px;border-radius:20px;font-size:13px;display:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <h1>📄 Layout Editor</h1>
  <select class="tb-select" id="docSizeSelect" onchange="onSizeChange(this.value)">
    <option value="540,520">Default (540×520)</option>
    <option value="612,792">Letter (612×792)</option>
    <option value="595,842">A4 (595×842)</option>
    <option value="540,360">Wide (540×360)</option>
    <option value="480,340">Card (480×340)</option>
    <option value="540,720">Full Page (540×720)</option>
  </select>
  <div class="tb-zoom">
    <button onclick="changeZoom(-0.15)">−</button>
    <span id="zoomLabel">100%</span>
    <button onclick="changeZoom(0.15)">+</button>
  </div>
  <label style="color:#aaa;font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="snapToggle" checked/> Snap
  </label>
  <label class="tb-btn" style="cursor:pointer">
    🖼 BG <input type="file" accept="image/*" style="display:none" onchange="loadBgFile(this)"/>
  </label>
  <button class="tb-btn" onclick="usePanda()">🐼</button>
  <button class="tb-btn danger" onclick="removeBg()">✕ BG</button>
  <div id="bgOpRow" style="display:none;align-items:center;gap:4px">
    <span style="font-size:11px;color:#888">Opacity</span>
    <input type="range" min="10" max="100" value="100" id="bgOpSlider" oninput="setBgOpacity(this.value)" style="width:70px;accent-color:#e94560"/>
    <span id="bgOpVal" style="font-size:11px;color:#e94560">100%</span>
  </div>
  <button class="tb-back" onclick="goBack()">← Back</button>
  <button class="tb-save" onclick="saveLayout()">Save</button>
</div>

<!-- Main -->
<div id="main">
  <!-- Left -->
  <div id="leftPanel">
    <div class="panel-head">Fields</div>
    <div id="fieldPalette"></div>
    <div id="addBtns">
      <button class="add-btn text" onclick="addCustomText()">+ Custom Text</button>
      <button class="add-btn photo" onclick="addPhoto()">+ Photo Box</button>
    </div>
    <div id="layersSection">
      <div class="panel-head" style="margin-top:0">Layers</div>
      <div id="layersList"></div>
    </div>
  </div>

  <!-- Stage -->
  <div id="stage">
    <div id="canvasOuter">
      <div id="bgLayer"></div>
      <div id="docCanvas">
        <div class="grid-overlay" id="gridOverlay"></div>
      </div>
    </div>
  </div>

  <!-- Right -->
  <div id="rightPanel">
    <div class="panel-head">Properties</div>
    <div id="propsInner">
      <p style="color:#555;font-size:12px;text-align:center;margin-top:16px">Select an element</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {apiKey:"AIzaSyAQbiR_7vvcUlr0nr3NKQ2csjh-iwe0rhY",authDomain:"visa-3504e.firebaseapp.com",projectId:"visa-3504e",storageBucket:"visa-3504e.firebasestorage.app",messagingSenderId:"618621727677",appId:"1:618621727677:web:72dccc703c97a5c739d8d4"};
const CLOUDINARY = {cloud_name:'dbgxllxdb', upload_preset:'efootball_screenshots'};

const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);

// ── Guard: must be logged in ──
onAuthStateChanged(auth, user=>{
  if(!user){ window.location.href='index.html'; }
});

// ── State ──
let elements = [];
let selected = null;
let counter = 0;
let zoom = 1;
let docW = 540, docH = 520;
let bgUrl = null, bgOpacity = 1;
const SNAP = 5;

const FIELD_DEFS = [
  {key:'firstName',  label:'First Name'},
  {key:'lastName',   label:'Last Name'},
  {key:'middleName', label:'Middle Name'},
  {key:'fullName',   label:'Full Name'},
  {key:'passportNum',label:'Passport No.'},
  {key:'citizenship',label:'Nationality'},
  {key:'dob',        label:'Date of Birth'},
  {key:'visaType',   label:'Visa Type/Class'},
  {key:'ref',        label:'Control Number'},
  {key:'issueDate',  label:'Issue Date'},
  {key:'validUntil', label:'Valid Until'},
  {key:'entries',    label:'Entries'},
  {key:'deliveryAddress', label:'Delivery Address'}
];

const DEFAULT_ELEMENTS = [
  { id:'el_photo', type:'photo',  x:60,  y:130, w:110, h:130, color:'#002868' },
  { id:'el_1',  type:'field', fieldKey:'fullName',     x:190, y:145, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_2',  type:'field', fieldKey:'passportNum',  x:190, y:165, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_3',  type:'field', fieldKey:'citizenship',  x:190, y:185, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_4',  type:'field', fieldKey:'dob',          x:190, y:205, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_5',  type:'field', fieldKey:'visaType',     x:190, y:225, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_6',  type:'field', fieldKey:'ref',          x:190, y:245, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_7',  type:'field', fieldKey:'entries',      x:190, y:265, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_8',  type:'field', fieldKey:'issueDate',    x:60,  y:300, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_9',  type:'field', fieldKey:'validUntil',   x:60,  y:320, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_10', type:'text',  content:'DOCUMENT REFERENCE:', x:60, y:450, fontSize:8, fontWeight:'normal', color:'#1e1e2e', align:'left' },
  { id:'el_11', type:'field', fieldKey:'ref',           x:60,  y:464, fontSize:11, fontWeight:'normal', color:'#1e1e2e', align:'left' }
];

// ── Toast ──
function toast(msg, color='#4ade80'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.color = color; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', 2500);
}

// ── Load from Firestore ──
async function load(){
  elements = JSON.parse(JSON.stringify(DEFAULT_ELEMENTS));
  try{
    const snap = await getDoc(doc(db,'settings','visaLayout'));
    if(snap.exists()){
      const d = snap.data();
      if(Array.isArray(d.elements)&&d.elements.length) elements = d.elements.map(el=>({
        fontWeight:'normal', color:'#1e1e2e', align:'left', ...el
      }));
      if(d.backgroundUrl) bgUrl = d.backgroundUrl;
      if(typeof d.backgroundOpacity==='number') bgOpacity = d.backgroundOpacity;
      if(typeof d.visaBoxW==='number') docW = d.visaBoxW;
      if(typeof d.visaBoxH==='number') docH = d.visaBoxH;
      const key = `${docW},${docH}`;
      const sel = document.getElementById('docSizeSelect');
      if([...sel.options].some(o=>o.value===key)) sel.value=key;
    }
  } catch(e){ /* use defaults */ }
  applyBg();
  render();
}

// ── Save ──
window.saveLayout = async function(){
  toast('Saving...','#fff');
  try{
    await setDoc(doc(db,'settings','visaLayout'),{
      elements, backgroundUrl:bgUrl||null, backgroundOpacity:bgOpacity,
      visaBoxW:docW, visaBoxH:docH, updatedAt:serverTimestamp()
    });
    toast('✅ Layout saved!');
    setTimeout(()=>{ window.location.href='index.html'; }, 900);
  } catch(e){
    toast('❌ Save failed: '+e.message,'#f87171');
  }
};

window.goBack = ()=>{ window.location.href='index.html'; };

// ── Size / Zoom ──
window.onSizeChange = function(val){
  const [w,h] = val.split(',').map(Number);
  docW=w; docH=h; render();
};

window.changeZoom = function(delta){
  zoom = Math.max(0.25, Math.min(3, zoom+delta));
  document.getElementById('canvasOuter').style.transform = `scale(${zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoom*100)+'%';
};

// ── Background ──
window.loadBgFile = function(input){
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e=> uploadBg(e.target.result);
  r.readAsDataURL(file); input.value='';
};

window.usePanda = ()=> uploadBg('bg-default.png');

async function uploadBg(src){
  toast('Uploading...','#fff');
  try{
    const img = await new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; });
    const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
    c.getContext('2d').drawImage(img,0,0);
    const blob = await new Promise(r=>c.toBlob(r,'image/jpeg',0.88));
    const fd = new FormData();
    fd.append('file',blob); fd.append('upload_preset',CLOUDINARY.upload_preset); fd.append('folder','visa_layout_backgrounds');
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloud_name}/image/upload`,{method:'POST',body:fd});
    const data = await res.json();
    if(!data.secure_url) throw new Error('Upload failed');
    bgUrl = data.secure_url; applyBg(); toast('✅ Background set!');
  } catch(e){ toast('❌ '+e.message,'#f87171'); }
}

window.removeBg = ()=>{ bgUrl=null; applyBg(); };

window.setBgOpacity = function(v){
  bgOpacity = v/100;
  document.getElementById('bgLayer').style.opacity = bgOpacity;
  document.getElementById('bgOpVal').textContent = v+'%';
};

function applyBg(){
  const layer = document.getElementById('bgLayer');
  layer.style.backgroundImage = bgUrl ? `url('${bgUrl}')` : '';
  layer.style.backgroundSize = 'cover';
  layer.style.backgroundPosition = 'center';
  layer.style.opacity = bgOpacity;
  const row = document.getElementById('bgOpRow');
  row.style.display = bgUrl ? 'flex' : 'none';
  document.getElementById('bgOpSlider').value = Math.round(bgOpacity*100);
  document.getElementById('bgOpVal').textContent = Math.round(bgOpacity*100)+'%';
}

// ── Add elements ──
function addField(key, label){
  counter++;
  elements.push({ id:'el_'+Date.now()+'_'+counter, type:'field', fieldKey:key, label,
    x:40, y:60+(counter*20)%200, fontSize:10, fontWeight:'normal', color:'#1e1e2e', align:'left', w:140, h:20 });
  render(); selectEl(elements[elements.length-1].id);
}

window.addCustomText = function(){
  const txt = prompt('Enter label text:','My Label'); if(!txt) return;
  counter++;
  elements.push({ id:'el_'+Date.now()+'_'+counter, type:'text', content:txt,
    x:40, y:80, fontSize:11, fontWeight:'normal', color:'#1e1e2e', align:'left', w:160, h:22 });
  render(); selectEl(elements[elements.length-1].id);
};

window.addPhoto = function(){
  counter++;
  elements.push({ id:'el_'+Date.now()+'_'+counter, type:'photo', x:36, y:60, w:90, h:108, color:'#002868' });
  render(); selectEl(elements[elements.length-1].id);
};

// ── Render ──
function render(){
  const canvas = document.getElementById('docCanvas');
  const outer = document.getElementById('canvasOuter');
  const bg = document.getElementById('bgLayer');
  canvas.style.width = docW+'px'; canvas.style.height = docH+'px';
  outer.style.width = docW+'px'; outer.style.height = docH+'px';
  bg.style.width = docW+'px'; bg.style.height = docH+'px';

  canvas.querySelectorAll('.el').forEach(e=>e.remove());
  elements.forEach(el=> canvas.appendChild(makeEl(el)));
  buildFieldPalette();
  buildLayers();
  showProps();
}

function snap(v){ return document.getElementById('snapToggle').checked ? Math.round(v/SNAP)*SNAP : v; }

function makeEl(el){
  const div = document.createElement('div');
  div.className = 'el' + (el.id===selected?' selected':'');
  div.dataset.id = el.id;
  div.style.left = el.x+'px';
  div.style.top = el.y+'px';
  div.style.width = (el.w||120)+'px';
  div.style.minHeight = (el.h||20)+'px';
  div.style.fontSize = (el.fontSize||10)+'px';
  div.style.fontWeight = el.fontWeight||'normal';
  div.style.color = el.color||'#1e1e2e';
  div.style.textAlign = el.align||'left';
  div.style.zIndex = el.id===selected ? 10 : 1;

  if(el.type==='photo'){
    div.style.border = el.id===selected ? '2px solid #e94560' : '1.5px dashed #002868';
    div.style.background = 'rgba(0,40,104,0.05)';
    div.style.display = 'flex'; div.style.alignItems='center'; div.style.justifyContent='center';
    div.style.fontWeight = '700'; div.style.fontSize = '10px';
    div.textContent = 'PHOTO';
  } else {
    div.style.border = el.id===selected ? '1.5px solid #e94560' : '1px solid rgba(0,40,104,0.2)';
    div.style.background = el.id===selected ? 'rgba(233,69,96,0.05)' : 'rgba(0,40,104,0.02)';
    const def = el.type==='field' ? FIELD_DEFS.find(f=>f.key===el.fieldKey) : null;
    div.textContent = el.type==='field' ? (def?def.label:el.fieldKey) : (el.content||'Text');
  }

  // Tap to select
  div.addEventListener('pointerdown', e=>{ if(e.target.classList.contains('el-handle')) return; selectEl(el.id); });

  // Drag to move
  let dragging=false, sx, sy, ox, oy;
  div.addEventListener('pointerdown', e=>{
    if(e.target.classList.contains('el-handle')) return;
    dragging=true; div.setPointerCapture(e.pointerId);
    sx=e.clientX; sy=e.clientY; ox=el.x; oy=el.y;
  });
  div.addEventListener('pointermove', e=>{
    if(!dragging) return;
    el.x = snap(Math.max(0, Math.min(docW-(el.w||120), ox+(e.clientX-sx)/zoom)));
    el.y = snap(Math.max(0, Math.min(docH-(el.h||20), oy+(e.clientY-sy)/zoom)));
    div.style.left=el.x+'px'; div.style.top=el.y+'px';
    updatePropsXY(el);
  });
  div.addEventListener('pointerup',()=>dragging=false);
  div.addEventListener('pointercancel',()=>dragging=false);

  // Handles (only on selected)
  if(el.id===selected){
    div.style.overflow='visible';

    // Delete handle
    const dh = document.createElement('div');
    dh.className='el-handle del'; dh.textContent='×';
    dh.addEventListener('pointerdown', e=>{ e.stopPropagation(); deleteEl(el.id); });
    div.appendChild(dh);

    // Resize handle
    const rh = document.createElement('div');
    rh.className='el-handle resize';
    let rdrag=false, rsx, rsy, rw, rh2;
    rh.addEventListener('pointerdown', e=>{
      e.stopPropagation(); rdrag=true; rh.setPointerCapture(e.pointerId);
      rsx=e.clientX; rsy=e.clientY; rw=el.w||120; rh2=el.h||20;
    });
    rh.addEventListener('pointermove', e=>{
      if(!rdrag) return;
      el.w = snap(Math.max(30, rw+(e.clientX-rsx)/zoom));
      el.h = snap(Math.max(14, rh2+(e.clientY-rsy)/zoom));
      div.style.width=el.w+'px'; div.style.minHeight=el.h+'px';
      updatePropsSizes(el);
    });
    rh.addEventListener('pointerup',()=>rdrag=false);
    rh.addEventListener('pointercancel',()=>rdrag=false);
    div.appendChild(rh);
  }

  return div;
}

function selectEl(id){ selected=id; render(); }

function deleteEl(id){
  elements = elements.filter(e=>e.id!==id);
  if(selected===id) selected=null;
  render();
}

// ── Field palette ──
function buildFieldPalette(){
  const pal = document.getElementById('fieldPalette');
  pal.innerHTML='';
  FIELD_DEFS.forEach(f=>{
    const btn = document.createElement('button');
    btn.className='field-btn'; btn.textContent=f.label;
    btn.onclick=()=>addField(f.key,f.label);
    pal.appendChild(btn);
  });
}

// ── Layers ──
function buildLayers(){
  const list = document.getElementById('layersList');
  list.innerHTML='';
  [...elements].reverse().forEach(el=>{
    const row = document.createElement('div');
    row.className='layer-row'+(el.id===selected?' active':'');
    const icon = el.type==='photo'?'🖼':el.type==='field'?'📋':'✏️';
    const name = el.type==='photo'?'Photo':el.type==='field'?(FIELD_DEFS.find(f=>f.key===el.fieldKey)||{label:el.fieldKey}).label:(el.content||'Text');
    row.innerHTML=`<span class="layer-icon">${icon}</span><span class="layer-name">${name}</span>`;
    row.onclick=()=>selectEl(el.id);
    list.appendChild(row);
  });
}

// ── Properties panel ──
function showProps(){
  const panel = document.getElementById('propsInner');
  const el = elements.find(e=>e.id===selected);
  if(!el){ panel.innerHTML='<p style="color:#555;font-size:12px;text-align:center;margin-top:16px">Select an element</p>'; return; }
  const isPhoto = el.type==='photo';
  panel.innerHTML=`
    ${!isPhoto?`
    <div>
      <span class="prop-label">Font Size</span>
      <div class="range-wrap">
        <input type="range" min="6" max="48" value="${el.fontSize||10}" id="pFontSize"
          oninput="liveUpdate('${el.id}','fontSize',+this.value,document.getElementById('pFontSizeVal'))"/>
        <span class="range-val" id="pFontSizeVal">${el.fontSize||10}</span>
      </div>
    </div>
    <div>
      <span class="prop-label">Style</span>
      <div class="prop-toggle-row">
        <button class="ptog${(el.fontWeight||'normal')==='normal'?' on':''}" onclick="setProp('${el.id}','fontWeight','normal')">Normal</button>
        <button class="ptog${el.fontWeight==='bold'?' on':''}" onclick="setProp('${el.id}','fontWeight','bold')"><b>Bold</b></button>
      </div>
    </div>
    <div>
      <span class="prop-label">Align</span>
      <div class="prop-toggle-row">
        <button class="ptog${(el.align||'left')==='left'?' on':''}" onclick="setProp('${el.id}','align','left')">L</button>
        <button class="ptog${el.align==='center'?' on':''}" onclick="setProp('${el.id}','align','center')">C</button>
        <button class="ptog${el.align==='right'?' on':''}" onclick="setProp('${el.id}','align','right')">R</button>
      </div>
    </div>
    `:''}
    <div>
      <span class="prop-label">Color</span>
      <input type="color" value="${el.color||'#1e1e2e'}" oninput="liveColor('${el.id}',this.value)" style="width:100%;height:34px;border:none;border-radius:6px;cursor:pointer;background:transparent"/>
    </div>
    <div>
      <span class="prop-label">Position</span>
      <div class="prop-row">
        <input type="number" class="prop-input" id="pX" value="${Math.round(el.x)}" placeholder="X" oninput="setPropDirect('${el.id}','x',+this.value)"/>
        <input type="number" class="prop-input" id="pY" value="${Math.round(el.y)}" placeholder="Y" oninput="setPropDirect('${el.id}','y',+this.value)"/>
      </div>
    </div>
    <div>
      <span class="prop-label">Size</span>
      <div class="prop-row">
        <input type="number" class="prop-input" id="pW" value="${Math.round(el.w||120)}" placeholder="W" oninput="setPropDirect('${el.id}','w',+this.value)"/>
        <input type="number" class="prop-input" id="pH" value="${Math.round(el.h||20)}" placeholder="H" oninput="setPropDirect('${el.id}','h',+this.value)"/>
      </div>
    </div>
    ${el.type==='text'?`
    <div>
      <span class="prop-label">Text</span>
      <textarea class="prop-input" rows="3" oninput="setPropDirect('${el.id}','content',this.value)" style="resize:vertical">${el.content||''}</textarea>
    </div>`:''}
    <button class="del-btn" onclick="deleteEl('${el.id}')">🗑 Delete</button>
  `;
}

// Live updates without full re-render
function liveUpdate(id, key, val, label){
  const el = elements.find(e=>e.id===id); if(!el) return;
  el[key]=val; if(label) label.textContent=val;
  const div = document.querySelector(`.el[data-id="${id}"]`);
  if(div){ if(key==='fontSize') div.style.fontSize=val+'px'; }
}
function liveColor(id, val){
  const el = elements.find(e=>e.id===id); if(!el) return;
  el.color=val;
  const div = document.querySelector(`.el[data-id="${id}"]`);
  if(div) div.style.color=val;
}
function updatePropsXY(el){
  const px=document.getElementById('pX'), py=document.getElementById('pY');
  if(px) px.value=Math.round(el.x); if(py) py.value=Math.round(el.y);
}
function updatePropsSizes(el){
  const pw=document.getElementById('pW'), ph=document.getElementById('pH');
  if(pw) pw.value=Math.round(el.w); if(ph) ph.value=Math.round(el.h);
}
window.setProp = function(id,key,val){ const el=elements.find(e=>e.id===id); if(el){el[key]=val;} render(); };
window.setPropDirect = function(id,key,val){
  const el=elements.find(e=>e.id===id); if(!el) return;
  el[key]=val;
  const div=document.querySelector(`.el[data-id="${id}"]`);
  if(div){
    if(key==='x') div.style.left=val+'px';
    if(key==='y') div.style.top=val+'px';
    if(key==='w') div.style.width=val+'px';
    if(key==='h') div.style.minHeight=val+'px';
  }
};
window.liveUpdate=liveUpdate; window.liveColor=liveColor;
window.deleteEl=deleteEl; window.selectEl=selectEl;
window.addField=addField;

// ── Init ──
load();
</script>
</body>
</html>
