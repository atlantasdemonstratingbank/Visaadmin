<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Layout Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1a1a2e;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
#topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:14px;font-weight:700;color:#e94560;margin-right:4px;white-space:nowrap}
.tb-btn{background:#0f3460;color:#ccc;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.tb-btn:active{border-color:#e94560;color:#e94560}
.tb-btn.red{border-color:#7f1d1d;color:#fca5a5}
select.tb-sel{background:#0f3460;color:#fff;border:1px solid #e94560;border-radius:6px;padding:5px 6px;font-size:12px;cursor:pointer}
.tb-zoom{display:flex;align-items:center;gap:4px}
.tb-zoom button{background:#0f3460;color:#fff;border:1px solid #333;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
#zoomLabel{color:#aaa;font-size:12px;min-width:38px;text-align:center}
.tb-save{background:#e94560;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer}
.tb-back{background:transparent;color:#aaa;border:1px solid #333;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
#main{display:flex;flex:1;overflow:hidden}
#leftPanel{width:155px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.panel-head{padding:7px 10px;font-size:10px;font-weight:700;color:#e94560;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #0f3460;flex-shrink:0}
#fieldPalette{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:4px}
.field-btn{width:100%;background:#0f3460;color:#ccc;border:1px solid #2a2a4a;border-radius:6px;padding:7px 8px;font-size:11px;cursor:pointer;text-align:left}
.field-btn:active{border-color:#e94560;color:#e94560}
#addBtns{padding:6px;border-top:1px solid #0f3460;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.add-btn{width:100%;background:transparent;border:1px dashed #555;border-radius:6px;padding:7px;font-size:11px;cursor:pointer;color:#aaa}
.add-btn.hi{color:#e94560;border-color:#e94560}
#layersSection{border-top:1px solid #0f3460;flex-shrink:0}
#layersList{max-height:120px;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:2px}
.layer-row{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:5px;cursor:pointer;border:1px solid transparent}
.layer-row:active{background:#0f3460}
.layer-row.active{background:#e9456022;border-color:#e94560}
.layer-name{font-size:11px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#stage{flex:1;overflow:auto;padding:28px;background:#111822;touch-action:pan-x pan-y;display:flex;align-items:flex-start;justify-content:center}
#stageInner{position:relative;flex-shrink:0;transform-origin:top left}
#bgLayer{position:absolute;inset:0;background-size:cover;background-position:center;pointer-events:none}
#docCanvas{position:relative;background:#fff;overflow:visible}
.grid-ov{position:absolute;inset:0;pointer-events:none;opacity:.05;background-image:linear-gradient(#88f 1px,transparent 1px),linear-gradient(90deg,#88f 1px,transparent 1px);background-size:20px 20px}
.el{position:absolute;cursor:grab;touch-action:none;box-sizing:border-box;padding:2px 4px;border-radius:2px;overflow:visible}
.el.sel{z-index:20!important}
.eh{position:absolute;width:17px;height:17px;border:2px solid #fff;border-radius:50%;touch-action:none;z-index:30;box-shadow:0 1px 4px rgba(0,0,0,.5)}
.eh.del{background:#f87171;top:-9px;right:-9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.eh.rsz{background:#e94560;bottom:-9px;right:-9px;cursor:nwse-resize}
#rightPanel{width:180px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;flex-shrink:0}
#propsInner{padding:10px;display:flex;flex-direction:column;gap:10px}
.pl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.pi{width:100%;background:#0f3460;color:#fff;border:1px solid #2a2a4a;border-radius:5px;padding:5px 7px;font-size:12px}
.pi:focus{outline:none;border-color:#e94560}
.pr{display:flex;gap:4px}
.pr .pi{flex:1}
.ptrow{display:flex;gap:4px}
.pt{flex:1;background:#0f3460;color:#ccc;border:1px solid #2a2a4a;border-radius:5px;padding:5px 4px;font-size:11px;cursor:pointer;text-align:center}
.pt.on{background:#e94560;border-color:#e94560;color:#fff}
.del-btn{width:100%;background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;padding:7px;font-size:12px;cursor:pointer;margin-top:4px}
.rw{display:flex;align-items:center;gap:5px}
.rw input[type=range]{flex:1;accent-color:#e94560;height:4px}
.rv{color:#e94560;font-size:11px;min-width:26px;text-align:right}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f3460;color:#fff;padding:9px 22px;border-radius:20px;font-size:13px;display:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#previewModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px}
#previewModal.open{display:flex}
#previewBox{background:#fff;border-radius:10px;overflow:hidden;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
#previewHead{background:#16213e;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#previewHead h3{color:#e94560;font-size:14px}
#previewClose{background:transparent;border:1px solid #555;color:#aaa;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
#previewFrame{overflow:auto;padding:20px;background:#eee;flex:1}
#previewDoc{position:relative;background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.2);flex-shrink:0}
</style>
</head>
<body>
<div id="topbar">
  <h1>📄 Layout Editor</h1>
  <select class="tb-sel" id="docSizeSelect" onchange="onSizeChange(this.value)">
    <option value="540,520">Default (540×520)</option>
    <option value="612,792">Letter (612×792)</option>
    <option value="595,842">A4 (595×842)</option>
    <option value="540,360">Wide (540×360)</option>
    <option value="480,340">Card (480×340)</option>
    <option value="540,720">Full Page (540×720)</option>
  </select>
  <div class="tb-zoom">
    <button onclick="changeZoom(-0.15)">−</button>
    <span id="zoomLabel">100%</span>
    <button onclick="changeZoom(0.15)">+</button>
  </div>
  <label style="color:#aaa;font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="snapToggle"/> Snap
  </label>
  <label class="tb-btn" style="cursor:pointer">🖼 BG<input type="file" accept="image/*" style="display:none" onchange="loadBgFile(this)"/></label>
  <button class="tb-btn" onclick="usePanda()">🐼 Panda</button>
  <button class="tb-btn red" onclick="removeBg()">✕ BG</button>
  <div id="bgOpRow" style="display:none;align-items:center;gap:4px">
    <span style="font-size:11px;color:#888">Opacity</span>
    <input type="range" min="10" max="100" value="100" id="bgOpSlider" oninput="setBgOp(this.value)" style="width:64px;accent-color:#e94560"/>
    <span id="bgOpVal" style="font-size:11px;color:#e94560;min-width:30px">100%</span>
  </div>
  <button class="tb-btn" onclick="previewLayout()" style="color:#4ade80;border-color:#4ade80">▶ Test</button>
  <button class="tb-back" onclick="goBack()">← Back</button>
  <button class="tb-save" onclick="saveLayout()">Save</button>
</div>

<div id="main">
  <div id="leftPanel">
    <div class="panel-head">Fields</div>
    <div id="fieldPalette"></div>
    <div id="addBtns">
      <button class="add-btn hi" onclick="addCustomText()">+ Custom Text</button>
      <button class="add-btn" onclick="addPhoto()">+ Photo Box</button>
    </div>
    <div id="layersSection">
      <div class="panel-head">Layers</div>
      <div id="layersList"></div>
    </div>
  </div>

  <div id="stage">
    <div id="stageInner">
      <div id="bgLayer"></div>
      <div id="docCanvas">
        <div class="grid-ov" id="gridOv"></div>
      </div>
    </div>
  </div>

  <div id="rightPanel">
    <div class="panel-head">Properties</div>
    <div id="propsInner"><p style="color:#555;font-size:12px;text-align:center;margin-top:16px">Select an element</p></div>
  </div>
</div>

<div id="toast"></div>

<div id="previewModal">
  <div id="previewBox">
    <div id="previewHead">
      <h3>Test Preview — Dummy Data</h3>
      <button id="previewClose" onclick="closePreview()">Close</button>
    </div>
    <div id="previewFrame">
      <div id="previewDoc"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyAQbiR_7vvcUlr0nr3NKQ2csjh-iwe0rhY",authDomain:"visa-3504e.firebaseapp.com",projectId:"visa-3504e",storageBucket:"visa-3504e.firebasestorage.app",messagingSenderId:"618621727677",appId:"1:618621727677:web:72dccc703c97a5c739d8d4"};
const CL={cloud_name:'dbgxllxdb',upload_preset:'efootball_screenshots'};
const app=initializeApp(FB), auth=getAuth(app), db=getFirestore(app);
onAuthStateChanged(auth,u=>{ if(!u) window.location.href='index.html'; });

const DUMMY={fullName:'Jane A. Doe',firstName:'Jane',lastName:'Doe',middleName:'A',passportNum:'A12345678',citizenship:'Ghanaian',dob:'1990-05-14',visaType:'B1/B2',ref:'VSA-2080-00001',deliveryAddress:'123 Main St, Accra, Ghana',issueDate:new Date().toLocaleDateString('en-US'),validUntil:new Date(Date.now()+365*24*60*60*1000).toLocaleDateString('en-US')};

const FIELD_DEFS=[
  {key:'firstName',label:'First Name'},{key:'lastName',label:'Last Name'},{key:'middleName',label:'Middle Name'},
  {key:'fullName',label:'Full Name'},{key:'passportNum',label:'Passport No.'},{key:'citizenship',label:'Nationality'},
  {key:'dob',label:'Date of Birth'},{key:'visaType',label:'Visa Type/Class'},{key:'ref',label:'Control Number'},
  {key:'issueDate',label:'Issue Date'},{key:'validUntil',label:'Valid Until'},{key:'entries',label:'Entries'},
  {key:'deliveryAddress',label:'Delivery Address'}
];

const DEFAULT_ELEMENTS=[
  {id:'el_photo',type:'photo',x:60,y:130,w:110,h:130,color:'#002868'},
  {id:'el_1',type:'field',fieldKey:'fullName',x:190,y:145,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_2',type:'field',fieldKey:'passportNum',x:190,y:165,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_3',type:'field',fieldKey:'citizenship',x:190,y:185,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_4',type:'field',fieldKey:'dob',x:190,y:205,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_5',type:'field',fieldKey:'visaType',x:190,y:225,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_6',type:'field',fieldKey:'ref',x:190,y:245,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_7',type:'field',fieldKey:'entries',x:190,y:265,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_8',type:'field',fieldKey:'issueDate',x:60,y:300,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:160,h:20},
  {id:'el_9',type:'field',fieldKey:'validUntil',x:60,y:320,fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:20},
  {id:'el_10',type:'text',content:'DOCUMENT REFERENCE:',x:60,y:450,fontSize:8,fontWeight:'normal',color:'#1e1e2e',align:'left',w:220,h:16},
  {id:'el_11',type:'field',fieldKey:'ref',x:60,y:464,fontSize:11,fontWeight:'normal',color:'#1e1e2e',align:'left',w:200,h:22}
];

let elements=[], selected=null, counter=0, zoom=1, docW=540, docH=520, bgUrl=null, bgOpacity=1;

function fieldVal(key){ const v=DUMMY[key]; if(v) return v; if(key==='entries') return 'Multiple (sandbox)'; return '—'; }
function fieldLabel(key){ return (FIELD_DEFS.find(f=>f.key===key)||{label:key}).label; }

function toast(msg,color='#4ade80'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.color=color; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',2800);
}

async function load(){
  elements=JSON.parse(JSON.stringify(DEFAULT_ELEMENTS));
  try{
    const snap=await getDoc(doc(db,'settings','visaLayout'));
    if(snap.exists()){
      const d=snap.data();
      if(Array.isArray(d.elements)&&d.elements.length) elements=d.elements.map(el=>({fontWeight:'normal',color:'#1e1e2e',align:'left',w:140,h:20,...el}));
      if(d.backgroundUrl) bgUrl=d.backgroundUrl;
      if(typeof d.backgroundOpacity==='number') bgOpacity=d.backgroundOpacity;
      if(typeof d.visaBoxW==='number') docW=d.visaBoxW;
      if(typeof d.visaBoxH==='number') docH=d.visaBoxH;
      const key=`${docW},${docH}`, sel=document.getElementById('docSizeSelect');
      if([...sel.options].some(o=>o.value===key)) sel.value=key;
    }
  } catch(e){}
  applyBg(); render();
}

window.saveLayout=async function(){
  toast('Saving...','#fff');
  try{
    await setDoc(doc(db,'settings','visaLayout'),{elements,backgroundUrl:bgUrl||null,backgroundOpacity:bgOpacity,visaBoxW:docW,visaBoxH:docH,updatedAt:serverTimestamp()});
    toast('✅ Saved!');
    setTimeout(()=>window.location.href='index.html',900);
  } catch(e){ toast('❌ '+e.message,'#f87171'); }
};

window.goBack=()=>window.location.href='index.html';
window.onSizeChange=function(val){ const[w,h]=val.split(',').map(Number); docW=w; docH=h; render(); };
window.changeZoom=function(delta){
  zoom=Math.max(0.2,Math.min(3,zoom+delta));
  document.getElementById('stageInner').style.transform=`scale(${zoom})`;
  document.getElementById('stageInner').style.transformOrigin='top left';
  document.getElementById('zoomLabel').textContent=Math.round(zoom*100)+'%';
};

window.loadBgFile=function(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader(); r.onload=e=>uploadBg(e.target.result); r.readAsDataURL(file); input.value='';
};
window.usePanda=()=>uploadBg('bg-default.png');

async function uploadBg(src){
  toast('Uploading background...','#fff');
  try{
    const img=await new Promise((res,rej)=>{
      const i=new Image(); i.crossOrigin='anonymous';
      i.onload=()=>res(i); i.onerror=rej; i.src=src;
    });
    const c=document.createElement('canvas'); c.width=img.width; c.height=img.height;
    c.getContext('2d').drawImage(img,0,0);
    const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.88));
    const fd=new FormData();
    fd.append('file',blob); fd.append('upload_preset',CL.upload_preset); fd.append('folder','visa_layout_backgrounds');
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CL.cloud_name}/image/upload`,{method:'POST',body:fd});
    const data=await res.json();
    if(!data.secure_url) throw new Error('Upload failed');
    bgUrl=data.secure_url; applyBg(); toast('✅ Background set!');
  } catch(e){ toast('❌ '+e.message,'#f87171'); }
}

window.removeBg=()=>{ bgUrl=null; applyBg(); };
window.setBgOp=function(v){ bgOpacity=v/100; document.getElementById('bgLayer').style.opacity=bgOpacity; document.getElementById('bgOpVal').textContent=v+'%'; };

function applyBg(){
  const layer=document.getElementById('bgLayer');
  // Use background-image directly on the layer div — positioned absolutely over the doc canvas
  if(bgUrl){
    layer.style.backgroundImage=`url('${bgUrl}')`;
    layer.style.backgroundSize='cover';
    layer.style.backgroundPosition='center';
    layer.style.opacity=bgOpacity;
    layer.style.width=docW+'px';
    layer.style.height=docH+'px';
  } else {
    layer.style.backgroundImage='none';
  }
  document.getElementById('bgOpRow').style.display=bgUrl?'flex':'none';
  document.getElementById('bgOpSlider').value=Math.round(bgOpacity*100);
  document.getElementById('bgOpVal').textContent=Math.round(bgOpacity*100)+'%';
}

function addField(key){
  counter++;
  elements.push({id:'el_'+Date.now()+'_'+counter,type:'field',fieldKey:key,label:fieldLabel(key),x:40,y:Math.min(docH-30,40+(counter*22)%180),fontSize:10,fontWeight:'normal',color:'#1e1e2e',align:'left',w:180,h:20});
  render(); selectEl(elements[elements.length-1].id);
}
window.addField=addField;

window.addCustomText=function(){
  const txt=prompt('Enter text:','My Label'); if(!txt) return;
  counter++;
  elements.push({id:'el_'+Date.now()+'_'+counter,type:'text',content:txt,x:40,y:80,fontSize:11,fontWeight:'normal',color:'#1e1e2e',align:'left',w:160,h:22});
  render(); selectEl(elements[elements.length-1].id);
};

window.addPhoto=function(){
  counter++;
  elements.push({id:'el_'+Date.now()+'_'+counter,type:'photo',x:36,y:60,w:90,h:108,color:'#002868',fontWeight:'normal',align:'left',fontSize:10});
  render(); selectEl(elements[elements.length-1].id);
};

function render(){
  const canvas=document.getElementById('docCanvas');
  const outer=document.getElementById('stageInner');
  const bg=document.getElementById('bgLayer');
  canvas.style.width=docW+'px'; canvas.style.height=docH+'px';
  outer.style.width=docW+'px'; outer.style.height=docH+'px';
  bg.style.width=docW+'px'; bg.style.height=docH+'px';
  canvas.querySelectorAll('.el').forEach(e=>e.remove());
  elements.forEach(el=>canvas.appendChild(makeEl(el)));
  buildFieldPalette(); buildLayers(); showProps();
}

function snp(v){ return document.getElementById('snapToggle').checked?Math.round(v/5)*5:v; }

function makeEl(el){
  const isSel=el.id===selected;
  const div=document.createElement('div');
  div.className='el'+(isSel?' sel':'');
  div.dataset.id=el.id;
  div.style.cssText=`left:${el.x}px;top:${el.y}px;width:${el.w||120}px;min-height:${el.h||20}px;font-size:${el.fontSize||10}px;font-weight:${el.fontWeight||'normal'};color:${el.color||'#1e1e2e'};text-align:${el.align||'left'};z-index:${isSel?20:1}`;

  if(el.type==='photo'){
    div.style.border=isSel?'2px solid #e94560':'1.5px dashed #002868';
    div.style.background='rgba(0,40,104,0.05)';
    div.style.display='flex'; div.style.alignItems='center'; div.style.justifyContent='center';
    div.style.fontWeight='700'; div.style.fontSize='11px'; div.style.color=el.color||'#002868';
    div.textContent='PHOTO';
  } else {
    div.style.border=isSel?'1.5px solid #e94560':'1px solid rgba(0,40,104,0.18)';
    div.style.background=isSel?'rgba(233,69,96,0.05)':'rgba(0,40,104,0.02)';
    div.style.overflow='hidden'; div.style.whiteSpace='nowrap'; div.style.textOverflow='ellipsis';
    const def=el.type==='field'?FIELD_DEFS.find(f=>f.key===el.fieldKey):null;
    div.textContent=el.type==='field'?(def?def.label:el.fieldKey):(el.content||'Text');
  }

  div.addEventListener('pointerdown',e=>{ if(e.target.classList.contains('eh')) return; selectEl(el.id); });

  // ── DRAG ──
  let drag=false,sx,sy,ox,oy;
  div.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('eh')) return;
    e.preventDefault();
    drag=true; div.setPointerCapture(e.pointerId);
    sx=e.clientX; sy=e.clientY; ox=el.x; oy=el.y;
    div.style.cursor='grabbing';
  });
  div.addEventListener('pointermove',e=>{
    if(!drag) return;
    // Divide by zoom so drag speed matches the scaled canvas
    const dx=(e.clientX-sx)/zoom, dy=(e.clientY-sy)/zoom;
    el.x=snp(Math.max(0,Math.min(docW-(el.w||120),ox+dx)));
    el.y=snp(Math.max(0,Math.min(docH-(el.h||20),oy+dy)));
    div.style.left=el.x+'px'; div.style.top=el.y+'px';
    updateXY(el);
  });
  div.addEventListener('pointerup',()=>{drag=false;div.style.cursor='grab';});
  div.addEventListener('pointercancel',()=>{drag=false;});

  if(isSel){
    div.style.overflow='visible';
    // Delete handle
    const dh=document.createElement('div');
    dh.className='eh del'; dh.textContent='×';
    dh.addEventListener('pointerdown',e=>{e.stopPropagation();deleteEl(el.id);});
    div.appendChild(dh);
    // Resize handle
    const rh=document.createElement('div');
    rh.className='eh rsz';
    let rd=false,rsx,rsy,rw0,rh0;
    rh.addEventListener('pointerdown',e=>{
      e.stopPropagation(); rd=true; rh.setPointerCapture(e.pointerId);
      rsx=e.clientX; rsy=e.clientY; rw0=el.w||120; rh0=el.h||20;
    });
    rh.addEventListener('pointermove',e=>{
      if(!rd) return;
      el.w=snp(Math.max(30,rw0+(e.clientX-rsx)/zoom));
      el.h=snp(Math.max(14,rh0+(e.clientY-rsy)/zoom));
      div.style.width=el.w+'px'; div.style.minHeight=el.h+'px';
      updateWH(el);
    });
    rh.addEventListener('pointerup',()=>rd=false);
    rh.addEventListener('pointercancel',()=>rd=false);
    div.appendChild(rh);
  }
  return div;
}

function selectEl(id){ selected=id; render(); }
window.selectEl=selectEl;

function deleteEl(id){
  elements=elements.filter(e=>e.id!==id);
  if(selected===id) selected=null;
  render();
}
window.deleteEl=deleteEl;

function buildFieldPalette(){
  const pal=document.getElementById('fieldPalette'); pal.innerHTML='';
  FIELD_DEFS.forEach(f=>{
    const b=document.createElement('button'); b.className='field-btn'; b.textContent=f.label;
    b.onclick=()=>addField(f.key); pal.appendChild(b);
  });
}

function buildLayers(){
  const list=document.getElementById('layersList'); list.innerHTML='';
  [...elements].reverse().forEach(el=>{
    const row=document.createElement('div');
    row.className='layer-row'+(el.id===selected?' active':'');
    const icon=el.type==='photo'?'🖼':el.type==='field'?'📋':'✏️';
    const name=el.type==='photo'?'Photo':el.type==='field'?fieldLabel(el.fieldKey):(el.content||'Text');
    row.innerHTML=`<span style="font-size:11px">${icon}</span><span class="layer-name">${name}</span>`;
    row.onclick=()=>selectEl(el.id);
    list.appendChild(row);
  });
}

function showProps(){
  const panel=document.getElementById('propsInner');
  const el=elements.find(e=>e.id===selected);
  if(!el){ panel.innerHTML='<p style="color:#555;font-size:12px;text-align:center;margin-top:16px">Select an element</p>'; return; }
  const ip=el.type==='photo';
  panel.innerHTML=`
    ${!ip?`
    <div>
      <span class="pl">Font Size</span>
      <div class="rw">
        <input type="range" min="6" max="48" value="${el.fontSize||10}" id="pFS" oninput="liveProp('${el.id}','fontSize',+this.value,document.getElementById('pFSv'))"/>
        <span class="rv" id="pFSv">${el.fontSize||10}</span>
      </div>
    </div>
    <div>
      <span class="pl">Style</span>
      <div class="ptrow">
        <button class="pt${(el.fontWeight||'normal')==='normal'?' on':''}" onclick="setProp('${el.id}','fontWeight','normal')">Normal</button>
        <button class="pt${el.fontWeight==='bold'?' on':''}" onclick="setProp('${el.id}','fontWeight','bold')"><b>Bold</b></button>
      </div>
    </div>
    <div>
      <span class="pl">Align</span>
      <div class="ptrow">
        <button class="pt${(el.align||'left')==='left'?' on':''}" onclick="setProp('${el.id}','align','left')">L</button>
        <button class="pt${el.align==='center'?' on':''}" onclick="setProp('${el.id}','align','center')">C</button>
        <button class="pt${el.align==='right'?' on':''}" onclick="setProp('${el.id}','align','right')">R</button>
      </div>
    </div>
    `:''}
    <div>
      <span class="pl">Color</span>
      <input type="color" value="${el.color||'#1e1e2e'}" oninput="liveColor('${el.id}',this.value)" style="width:100%;height:34px;border:none;border-radius:6px;cursor:pointer;background:transparent"/>
    </div>
    <div>
      <span class="pl">Position (X, Y)</span>
      <div class="pr">
        <input type="number" class="pi" id="pX" value="${Math.round(el.x)}" oninput="setDirect('${el.id}','x',+this.value)"/>
        <input type="number" class="pi" id="pY" value="${Math.round(el.y)}" oninput="setDirect('${el.id}','y',+this.value)"/>
      </div>
    </div>
    <div>
      <span class="pl">Size (W, H)</span>
      <div class="pr">
        <input type="number" class="pi" id="pW" value="${Math.round(el.w||120)}" oninput="setDirect('${el.id}','w',+this.value)"/>
        <input type="number" class="pi" id="pH" value="${Math.round(el.h||20)}" oninput="setDirect('${el.id}','h',+this.value)"/>
      </div>
    </div>
    ${el.type==='text'?`<div><span class="pl">Text</span><textarea class="pi" rows="3" oninput="setDirect('${el.id}','content',this.value)" style="resize:vertical">${el.content||''}</textarea></div>`:''}
    <button class="del-btn" onclick="deleteEl('${el.id}')">🗑 Delete</button>
  `;
}

function updateXY(el){ const px=document.getElementById('pX'),py=document.getElementById('pY'); if(px)px.value=Math.round(el.x); if(py)py.value=Math.round(el.y); }
function updateWH(el){ const pw=document.getElementById('pW'),ph=document.getElementById('pH'); if(pw)pw.value=Math.round(el.w); if(ph)ph.value=Math.round(el.h); }

window.liveProp=function(id,key,val,label){ const el=elements.find(e=>e.id===id); if(!el) return; el[key]=val; if(label)label.textContent=val; const div=document.querySelector(`.el[data-id="${id}"]`); if(div&&key==='fontSize') div.style.fontSize=val+'px'; };
window.liveColor=function(id,val){ const el=elements.find(e=>e.id===id); if(!el) return; el.color=val; const div=document.querySelector(`.el[data-id="${id}"]`); if(div) div.style.color=val; };
window.setProp=function(id,key,val){ const el=elements.find(e=>e.id===id); if(el){el[key]=val;} render(); };
window.setDirect=function(id,key,val){ const el=elements.find(e=>e.id===id); if(!el) return; el[key]=val; const div=document.querySelector(`.el[data-id="${id}"]`); if(div){ if(key==='x')div.style.left=val+'px'; if(key==='y')div.style.top=val+'px'; if(key==='w')div.style.width=val+'px'; if(key==='h')div.style.minHeight=val+'px'; } };

// ── TEST PREVIEW ──
window.previewLayout=function(){
  const box=document.getElementById('previewDoc');
  box.style.width=docW+'px'; box.style.height=docH+'px'; box.style.position='relative'; box.style.background='#fff';
  box.innerHTML='';

  // Background
  if(bgUrl){
    const bl=document.createElement('div');
    bl.style.cssText=`position:absolute;inset:0;background:url('${bgUrl}') center/cover;opacity:${bgOpacity};pointer-events:none`;
    box.appendChild(bl);
  }

  // Render each element with real dummy data
  elements.forEach(el=>{
    const div=document.createElement('div');
    div.style.cssText=`position:absolute;left:${el.x}px;top:${el.y}px;width:${el.w||120}px;min-height:${el.h||20}px;font-size:${el.fontSize||10}px;font-weight:${el.fontWeight||'normal'};color:${el.color||'#1e1e2e'};text-align:${el.align||'left'};box-sizing:border-box;padding:2px 4px;font-family:sans-serif`;
    if(el.type==='photo'){
      div.style.border='1.5px solid #002868'; div.style.background='#eef0f8'; div.style.display='flex';
      div.style.alignItems='center'; div.style.justifyContent='center'; div.style.fontSize='11px';
      div.style.fontWeight='700'; div.style.color=el.color||'#002868';
      div.textContent='[PHOTO]';
    } else {
      const def=el.type==='field'?FIELD_DEFS.find(f=>f.key===el.fieldKey):null;
      if(el.type==='field'){
        const label=def?def.label:el.fieldKey;
        const val=fieldVal(el.fieldKey);
        div.textContent=`${label}: ${val}`;
      } else {
        div.textContent=el.content||'';
      }
    }
    box.appendChild(div);
  });

  document.getElementById('previewModal').classList.add('open');
};

window.closePreview=()=>document.getElementById('previewModal').classList.remove('open');

load();
</script>
